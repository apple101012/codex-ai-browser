<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proxy Checker — Codex AI Browser</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/app/styles.css" />
    <style>
      .risk-low    { color: #10b981; font-weight: 600; }
      .risk-medium { color: #f59e0b; font-weight: 600; }
      .risk-high   { color: #ef4444; font-weight: 600; }
      .risk-very-high { color: #dc2626; font-weight: 700; }

      .spam-clean  { color: #10b981; }
      .spam-listed { color: #ef4444; font-weight: 600; }

      .status-pending  { color: var(--text-muted); }
      .status-checking { color: #f59e0b; animation: pulse 1.2s infinite; }
      .status-ok-text  { color: #10b981; }
      .status-err-text { color: #ef4444; }

      .proxy-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
      .proxy-table th { padding: 10px 12px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
      .proxy-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
      .proxy-table tr:last-child td { border-bottom: none; }
      .proxy-table tr:hover td { background: rgba(255,255,255,0.02); }

      .score-pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
      }
      .score-low    { background: rgba(16,185,129,0.15); color: #10b981; }
      .score-medium { background: rgba(245,158,11,0.15); color: #f59e0b; }
      .score-high   { background: rgba(239,68,68,0.15); color: #ef4444; }

      .progress-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
      .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #00f2fe, #4facfe); border-radius: 2px; transition: width 0.3s ease; }

      .nav-link {
        color: var(--primary);
        text-decoration: none;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 12px;
        border-radius: 8px;
        transition: var(--transition);
        background: var(--secondary);
      }
      .nav-link:hover { background: var(--secondary-hover); }

      .results-summary {
        display: flex;
        gap: 20px;
        padding: 12px 16px;
        background: rgba(255,255,255,0.03);
        border-radius: 10px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .summary-item { display: flex; flex-direction: column; gap: 2px; }
      .summary-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
      .summary-value { font-size: 1.1rem; font-weight: 700; }

      .assign-btn {
        font-size: 0.7rem;
        padding: 3px 8px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--secondary);
        color: var(--text-main);
        cursor: pointer;
        white-space: nowrap;
      }
      .assign-btn:hover { background: var(--secondary-hover); }

      .export-btn {
        display: flex; align-items: center; gap: 6px;
      }
    </style>
  </head>
  <body>
    <div class="app-layout">
      <header class="top-nav">
        <div class="logo-container">
          <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#00f2fe" />
                <stop offset="100%" stop-color="#4facfe" />
              </linearGradient>
            </defs>
            <rect x="10" y="20" width="80" height="60" rx="8" fill="none" stroke="url(#logoGrad)" stroke-width="6"/>
            <circle cx="22" cy="30" r="3" fill="url(#logoGrad)"/>
            <circle cx="34" cy="30" r="3" fill="url(#logoGrad)"/>
            <line x1="10" y1="40" x2="90" y2="40" stroke="url(#logoGrad)" stroke-width="4"/>
            <path d="M 40 60 L 50 50 L 60 60" stroke="url(#logoGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
            <line x1="50" y1="50" x2="50" y2="70" stroke="url(#logoGrad)" stroke-width="4" stroke-linecap="round"/>
          </svg>
          <div class="logo-text">
            <h2>Codex</h2>
            <span>Proxy Checker</span>
          </div>
        </div>
        <div class="nav-actions">
          <a href="/app" class="nav-link">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Dashboard
          </a>
        </div>
      </header>

      <main class="main-content">
        <div style="max-width: 1200px; margin: 0 auto; padding: 24px; display: flex; flex-direction: column; gap: 20px;">

          <section class="panel glass-panel fade-in">
            <div class="panel-header">
              <h2>Bulk Proxy Checker</h2>
            </div>
            <div class="panel-body">
              <p style="color: var(--text-muted); margin-bottom: 16px; font-size: 0.9rem;">
                Paste proxies one per line. Supported formats: <code style="background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px;">host:port:user:pass</code>,
                <code style="background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px;">user:pass@host:port</code>,
                <code style="background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px;">socks5://host:port</code>
              </p>
              <textarea
                id="proxyListInput"
                rows="6"
                placeholder="proxy.smartproxy.net:3120:username:password&#10;proxy.smartproxy.net:3120:username2:password2&#10;192.168.1.1:8080"
                style="width: 100%; font-family: monospace; font-size: 0.85rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 8px; color: var(--text-main); padding: 12px; resize: vertical; line-height: 1.5;"
              ></textarea>
              <div class="action-row mt-3" style="align-items: center; gap: 12px;">
                <button id="checkAllBtn" class="btn-primary">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                  Check All
                </button>
                <button id="stopBtn" class="btn-danger" disabled>Stop</button>
                <button id="clearBtn" class="btn-secondary">Clear Results</button>
                <button id="exportCsvBtn" class="btn-secondary export-btn" disabled>
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  Export CSV
                </button>
                <span id="statusText" class="status-text" style="margin: 0; flex: 1; text-align: right;"></span>
              </div>
              <div class="progress-bar-wrap" id="progressBarWrap" style="display:none;">
                <div class="progress-bar-fill" id="progressBarFill" style="width: 0%;"></div>
              </div>
            </div>
          </section>

          <section class="panel glass-panel fade-in" id="resultsSection" style="display:none;">
            <div class="panel-header">
              <h2>Results</h2>
            </div>
            <div class="panel-body" style="padding-bottom: 0;">
              <div id="resultsSummary" class="results-summary" style="margin-bottom: 0;"></div>
            </div>
            <div class="panel-body p-0">
              <div class="table-container">
                <table class="proxy-table">
                  <thead>
                    <tr>
                      <th>#</th>
                      <th>Proxy</th>
                      <th>Status</th>
                      <th>IP Address</th>
                      <th>Location</th>
                      <th>ISP / Org</th>
                      <th>Scamalytics</th>
                      <th>Spamhaus</th>
                      <th>Actions</th>
                    </tr>
                  </thead>
                  <tbody id="resultsBody"></tbody>
                </table>
              </div>
            </div>
          </section>

        </div>
      </main>
    </div>

    <script type="module" src="/app/proxy-checker.js"></script>
  </body>
</html>
